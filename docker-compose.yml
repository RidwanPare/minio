services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_SERVER_URL: https://s3.colibri-bf.com
      MINIO_BROWSER_REDIRECT_URL: https://minio.colibri-bf.com

    volumes:
      - minio_data:/data

    expose:
      - "9000"
      - "9001"

volumes:
  minio_data: